name: Backend CI

on:
  push:
    branches: [staging/githubpages-railway]
  pull_request:
    branches: [staging/githubpages-railway]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -m pytest

  add-deployment-info:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Backend deployed to Railway: ${process.env.RAILWAY_URL || 'Set RAILWAY_URL secret'}\n\nFrontend: https://${context.repo.owner}.github.io/${context.repo.repo}`
            })